name: CI

on:
  pull_request: ~
  push:
    branches:
      - main
  workflow_dispatch: ~

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint-and-tests:
    name: "Lint and Tests (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker images
        uses: docker/bake-action@v7
        with:
          pull: true
          load: true
          source: .
          files: |
            compose.yaml
            compose.override.yaml
          set: |
            *.cache-from=type=gha,scope=${{github.ref}}
            *.cache-from=type=gha,scope=refs/heads/main
            *.cache-to=type=gha,scope=${{github.ref}},mode=max

      - name: Start services
        run: docker compose up --wait --no-build

      - name: Check HTTP reachability
        run: curl -v --fail-with-body http://localhost

      # Uncomment when the homepage is configured, or change the path to check
      # - name: Check HTTPS reachability
      #   run: curl -v --insecure --fail-with-body https://localhost

      - name: Check Mercure reachability
        run: curl -vI --insecure --fail-with-body https://localhost/.well-known/mercure?topic=test

      - name: Create test database
        run: docker compose exec -T php bin/console -e test doctrine:database:create

      - name: Run migrations
        run: docker compose exec -T php bin/console -e test doctrine:migrations:migrate --no-interaction

      - name: Doctrine Schema Validator
        run: docker compose exec -T php bin/console -e test doctrine:schema:validate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install JS dependencies
        run: yarn install --immutable --non-interactive

      - name: Cache frontend build
        id: frontend-build-cache
        uses: actions/cache@v4
        with:
          path: public/build
          key: "${{ runner.os }}-frontend-build-v1-${{ hashFiles('yarn.lock', 'package.json', 'webpack.config.js', 'postcss.config.mjs', 'tailwind.config.js', 'assets/**') }}"

      - name: Build frontend assets
        if: steps.frontend-build-cache.outputs.cache-hit != 'true'
        run: yarn build

      - name: Cache warmup
        run: docker compose exec -T php vendor/bin/console cache:warmup --env=test --no-debug

      - name: Security audit
        run: composer audit

      - name: PHPStan
        run: docker compose exec -T php vendor/bin/phpstan analyse -c phpstan.dist.neon --memory-limit=1G

      - name: Rector (dry-run)
        run: docker compose exec -T php vendor/bin/rector process --dry-run

      - name: PHP-CS-Fixer (dry-run)
        run: docker compose exec -T php vendor/bin/php-cs-fixer fix --dry-run --verbose

      - name: PHP_CodeSniffer
        run: docker compose exec -T php vendor/bin/phpcs --runtime-set ignore_warnings_on_exit 1

      - name: Missing translations
        run: |
          docker compose exec -T php bin/console debug:translation en --only-missing
          docker compose exec -T php bin/console debug:translation fr --only-missing

      - name: Lint translations
        run: docker compose exec -T php bin/console lint:translations --locale=en --locale=fr

      - name: Lint YAML
        run: docker compose exec -T php bin/console lint:yaml ./config --parse-tags

      - name: Lint Twig
        run: docker compose exec -T php bin/console lint:twig ./templates

      - name: Twig CS
        run: docker compose exec -T php vendor/bin/twig-cs-fixer lint

      - name: Run Paratest
        run: docker compose exec -T php bin/paratest tests --runner WrapperRunner
