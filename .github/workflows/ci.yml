name: CI

on:
    pull_request:
    push:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-and-tests:
        name: "Lint and Tests (PHP ${{ matrix.php }})"
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_DB: app
                    POSTGRES_USER: app
                    POSTGRES_PASSWORD: password
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U app -d app"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5
        strategy:
            matrix:
                php: [8.5]
        env:
            APP_ENV: test

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: none
                  extensions: ctype, iconv, intl, pdo_pgsql

            - name: Validate composer.json
              run: composer validate --strict --no-check-publish

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.composer/cache/files
                      var/.phpstan.tmp
                      var/.phpcs-cache
                  key: "${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}"
                  restore-keys: |
                      ${{ runner.os }}-php${{ matrix.php }}-composer-

            - name: Install PHP dependencies
              run: composer install --prefer-dist --no-interaction --no-progress

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: yarn
                  cache-dependency-path: yarn.lock

            - name: Enable Corepack
              run: corepack enable

            - name: Install JS dependencies
              run: yarn install --immutable --non-interactive

            - name: Cache frontend build
              id: frontend-build-cache
              uses: actions/cache@v4
              with:
                  path: public/build
                  key: "${{ runner.os }}-frontend-build-v1-${{ hashFiles('yarn.lock', 'package.json', 'webpack.config.js', 'postcss.config.mjs', 'tailwind.config.js', 'assets/**') }}"

            - name: Build frontend assets
              if: steps.frontend-build-cache.outputs.cache-hit != 'true'
              run: yarn build

            - name: Cache warmup
              run: |
                  php bin/console cache:warmup --env=test --no-debug

            - name: Security audit
              run: composer audit

            - name: PHPStan
              run: ./vendor/bin/phpstan analyse -c phpstan.dist.neon --memory-limit=1G

            - name: Rector (dry-run)
              run: ./vendor/bin/rector process --dry-run

            - name: PHP-CS-Fixer (dry-run)
              run: ./vendor/bin/php-cs-fixer fix --dry-run --verbose

            - name: PHP_CodeSniffer
              run: ./vendor/bin/phpcs --runtime-set ignore_warnings_on_exit 1

            - name: Missing translations
              run: |
                  php bin/console debug:translation en --only-missing
                  php bin/console debug:translation fr --only-missing

            - name: Lint translations
              run: php bin/console lint:translations --locale=en --locale=fr

            - name: Lint Doctrine schema
              run: php bin/console doctrine:schema:validate --skip-sync -vvv --no-interaction

            - name: Lint YAML
              run: php bin/console lint:yaml ./config --parse-tags

            - name: Lint Twig
              run: php bin/console lint:twig ./templates

            - name: Twig CS
              run: ./vendor/bin/twig-cs-fixer lint

            - name: Tests (Paratest)
              run: ./vendor/bin/paratest tests --runner WrapperRunner
