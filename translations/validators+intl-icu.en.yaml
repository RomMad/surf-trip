security:
    registration:
        agree_terms:
            is_true: You should agree to the terms.
        password:
            invalid: The password fields must match.
            not_blank: Please enter a password.
            min_length: The password should be at least {limit} characters.
            max_length: The password cannot be longer than {limit} characters.
    reset_password:
        email:
            not_blank: Please enter your email.
        password:
            invalid: The password fields must match.
            not_blank: Please enter a password.
            min_length: Your password should be at least {limit} characters.

surf_session:
    spot:
        not_blank: Spot is required.
        max_length: Spot cannot exceed {limit} characters.
    board:
        max_length: Board cannot exceed {limit} characters.
    date:
        not_null: Date is required.
    start_time:
        not_blank: Start time is required.
        invalid_format: Start time must use HH:MM format.
    duration_minutes:
        not_null: Duration is required.
    start_at:
        not_null: Start date is required.
    end_at:
        not_null: End date is required.
        after_start_at: End date must be greater than start date.
    rating:
        range: Rating must be between {min} and {max}.
    objective:
        max_length: Objective cannot exceed {limit} characters.
    comment:
        max_length: Comment cannot exceed {limit} characters.

trip:
    title:
        not_blank: Title is required.
        min_length: Title must be at least 5 characters long.
        max_length: Title cannot exceed 255 characters.
    location:
        not_blank: Location is required.
        min_length: Location must be at least 3 characters long.
        max_length: Location cannot exceed 255 characters.
    start_at:
        not_null: Start date is required.
    end_at:
        not_null: End date is required.
        before_start_at: End date must be greater than or equal to start date.
    required_levels:
        min_count: Select at least one required level.
        invalid_type: A selected required level is invalid.
    description:
        max_length: Description cannot exceed {limit} characters.
    owner:
        min_count: Select at least one admin.

user:
    avatar:
        max_length: Avatar path cannot exceed {limit} characters.
        invalid_path: Avatar must be a file path or filename, not a URL.
    description:
        max_length: Description cannot exceed {limit} characters.
    email:
        not_blank: Email address is required.
        invalid: Email address is not valid.
        max_length: Email address cannot exceed {limit} characters.
        unique: This email address is already used.
    first_name:
        not_blank: First name is required.
        max_length: First name cannot exceed {limit} characters.
    instagram:
        invalid_format: Instagram handle format is invalid.
    last_name:
        max_length: Last name cannot exceed {limit} characters.
    location:
        max_length: Location cannot exceed {limit} characters.
    password:
        not_blank: Password is required.
    username:
        not_blank: Username is required.
        min_length: Username must be at least {limit} characters long.
        max_length: Username cannot exceed {limit} characters.
        invalid_format: Username can only contain letters, numbers, dots and underscores.
        unique: This username is already used.
