            title: Password Reset Email Sent
            description: If an account matching your email exists, then an email was just sent that contains a link that you can use to reset your password. This link will expire in {expires}.
            retry: If you don't receive an email please check your spam folder or {link}.
            retry_link: try again
        reset:
            title: Reset your password
            submit: Reset password
        email:
            intro: To reset your password, please visit the following link.
            expires: This link will expire in {expires}.
